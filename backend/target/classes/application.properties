# ==============================
# SpaceSync – Application Config
# ==============================

spring.application.name=SpaceSync

# ── Server ──────────────────────
server.port=8080

# ── H2 In-Memory Database (Dev) ─
# Switch to MySQL when ready by commenting out H2 and uncommenting MySQL block
spring.datasource.url=jdbc:h2:mem:spacesyncdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ─────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── MySQL (Uncomment when ready) ─
# spring.datasource.url=jdbc:mysql://localhost:3306/spacesync?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── Google OAuth2 ────────────────
# Replace with your actual Google Cloud Console credentials
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── JWT ──────────────────────────
# Generate a strong secret: openssl rand -base64 64
app.jwt.secret=SpaceSyncSuperSecretKeyForJWTSigningMustBe256BitsOrMoreInProductionReplaceThis2026
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────
app.cors.allowed-origins=http://localhost:5173

# ── Logging ──────────────────────
logging.level.com.spacesync=DEBUG
logging.level.org.springframework.security=INFO
